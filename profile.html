<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>الملف الشخصي - رقيم</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-page{
width:min(700px,90%);
margin:50px auto;
}


.profile-card{

background:rgba(255,255,255,.7);

backdrop-filter:blur(20px);

border-radius:30px;

padding:35px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.08);

}



.profile-photo{

width:110px;

height:110px;

border-radius:50%;

object-fit:cover;

margin-bottom:20px;

}



.profile-name{

font-size:30px;

font-weight:600;

}



.bio{

color:#777;

margin:15px 0;

line-height:2;

}



.stats{

display:flex;

justify-content:space-around;

margin:30px 0;

}



.stat strong{

display:block;

font-size:22px;

}



.stat span{

color:#777;

font-size:13px;

}



.menu{

background:white;

border-radius:25px;

overflow:hidden;

}



.menu a{

display:flex;

justify-content:space-between;

padding:20px;

text-decoration:none;

color:#111;

border-bottom:1px solid #eee;

}



.menu a:last-child{

border:0;

}


</style>


</head>


<body>


<div class="profile-page">


<div class="profile-card">


<img id="photo"
class="profile-photo">



<h1 id="name"
class="profile-name">
تحميل...
</h1>



<p id="bio"
class="bio">
كاتب في رقيم
</p>



<div class="stats">


<div class="stat">

<strong id="followers">
0
</strong>

<span>
متابع
</span>

</div>



<div class="stat">

<strong id="following">
0
</strong>

<span>
يتابع
</span>

</div>



<div class="stat">

<strong id="posts">
0
</strong>

<span>
قصيدة
</span>

</div>


</div>



</div>





<div class="menu">


<a href="notifications.html">

<span>
🔔 الإشعارات
</span>

<span>
›
</span>

</a>


<a href="#">

<span>
❤️ الإعجابات
</span>

<span>
›
</span>

</a>


<a href="#">

<span>
💬 التعليقات
</span>

<span>
›
</span>

</a>


<a href="#">

<span>
📚 قصائدي
</span>

<span>
›
</span>

</a>


</div>


</div>



<script type="module" src="profile.js"></script>


</body>

</html>
