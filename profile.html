<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ملفي - رقيم</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

background:#f7f7f5;

font-family:"Noto Sans Arabic",sans-serif;

color:#1c1c1e;

}



.profile-page{

width:min(600px,90%);

margin:40px auto;

}



.profile-card{

background:rgba(255,255,255,.75);

backdrop-filter:blur(20px);

border:1px solid rgba(0,0,0,.06);

border-radius:30px;

padding:35px 25px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.08);

}



.profile-photo{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:5px solid white;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}



.name{

font-size:30px;

margin:15px 0 5px;

font-weight:700;

}



.username{

color:#777;

font-size:15px;

}



.bio{

margin:20px auto;

color:#555;

line-height:2;

max-width:400px;

}



.edit-btn{

display:inline-block;

background:#111;

color:white;

text-decoration:none;

padding:12px 25px;

border-radius:20px;

font-size:14px;

}



.stats{

display:flex;

justify-content:space-around;

margin-top:35px;

}



.stat strong{

display:block;

font-size:22px;

}



.stat span{

color:#777;

font-size:13px;

}



.menu{

margin-top:25px;

background:white;

border-radius:25px;

overflow:hidden;

}



.menu a{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

text-decoration:none;

color:#111;

border-bottom:1px solid #eee;

}



.menu a:last-child{

border:0;

}



.arrow{

color:#bbb;

font-size:25px;

}



</style>


</head>


<body>


<div class="profile-page">



<div class="profile-card">


<img id="photo"
class="profile-photo"
src="">



<h1 id="name" class="name">
تحميل...
</h1>



<p id="username" class="username">
@username
</p>



<p id="bio" class="bio">
كاتب في رقيم
</p>



<a href="edit-profile.html" class="edit-btn">

تعديل الملف الشخصي

</a>



<div class="stats">


<div class="stat">

<strong id="followers">
0
</strong>

<span>
متابع
</span>

</div>



<div class="stat">

<strong id="following">
0
</strong>

<span>
يتابع
</span>

</div>



<div class="stat">

<strong id="posts">
0
</strong>

<span>
قصائد
</span>

</div>


</div>



</div>





<div class="menu">


<a href="my-comments.html">

<span>
💬 تعليقاتي
</span>

<span class="arrow">
›
</span>

</a>



<a href="likes.html">

<span>
❤️ إعجاباتي
</span>

<span class="arrow">
›
</span>

</a>



<a href="notifications.html">

<span>
🔔 الإشعارات
</span>

<span class="arrow">
›
</span>

</a>



<a href="my-posts.html">

<span>
📚 قصائدي
</span>

<span class="arrow">
›
</span>

</a>



</div>



</div>




<script type="module" src="profile.js"></script>


</body>

</html>
