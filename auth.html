<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>حساب رقيم</title>

<style>

body{
margin:0;
background:#f7f7f5;
font-family:Arial,sans-serif;
}

.box{
width:90%;
max-width:400px;
margin:70px auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 40px #0002;
}

input,button{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:0;
cursor:pointer;
}

.google{
background:#111;
}

h1{
text-align:center;
}

.switch{
text-align:center;
color:#007aff;
cursor:pointer;
}

.hidden{
display:none;
}

#msg{
text-align:center;
color:#777;
}

</style>

</head>


<body>


<div class="box">


<h1 id="title">
إنشاء حساب
</h1>


<button id="googleBtn" class="google">
تسجيل بواسطة Google
</button>


<hr>


<div id="register">


<input id="name" placeholder="الاسم">

<input id="email" placeholder="الإيميل">

<input id="password" type="password" placeholder="كلمة المرور">


<button id="registerBtn">
إنشاء حساب
</button>


</div>



<div id="login" class="hidden">


<input id="loginEmail" placeholder="الإيميل">


<input id="loginPassword" type="password" placeholder="كلمة المرور">


<button id="loginBtn">
دخول
</button>


</div>



<p class="switch" id="switch">
لديك حساب؟ تسجيل الدخول
</p>


<p id="msg"></p>


</div>



<script type="module" src="./auth.js"></script>


</body>

</html>
