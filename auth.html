<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>حساب رقيم</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">


<style>

body{
margin:0;
background:#f5f5f7;
font-family:"Noto Sans Arabic",sans-serif;
color:#1d1d1f;
}

.box{

width:min(420px,90%);
margin:80px auto;

background:white;

padding:35px;

border-radius:25px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

h1{
text-align:center;
}


input{

width:100%;
padding:15px;

margin:10px 0;

border:1px solid #ddd;

border-radius:15px;

font-family:inherit;

}


button{

width:100%;

padding:15px;

border:0;

border-radius:15px;

background:#007aff;

color:white;

font-size:16px;

margin-top:10px;

cursor:pointer;

}


.google{

background:#111;

}


.switch{

text-align:center;

color:#007aff;

cursor:pointer;

margin-top:20px;

}


.message{

text-align:center;

color:#777;

}


.hidden{

display:none;

}


</style>


</head>


<body>


<div class="box">


<h1 id="title">
إنشاء حساب
</h1>



<button id="googleBtn" class="google">
تسجيل بواسطة Google
</button>



<hr>



<div id="register">


<input id="name" placeholder="الاسم">


<input id="email" type="email" placeholder="البريد الإلكتروني">


<input id="password" type="password" placeholder="كلمة المرور">


<button id="registerBtn">
إنشاء حساب
</button>


</div>



<div id="login" class="hidden">


<input id="loginEmail" type="email" placeholder="البريد الإلكتروني">


<input id="loginPassword" type="password" placeholder="كلمة المرور">


<button id="loginBtn">
تسجيل الدخول
</button>


</div>



<p id="switch" class="switch">
لديك حساب؟ تسجيل الدخول
</p>



<p id="message" class="message"></p>


</div>


<script type="module" src="./auth.js"></script>


</body>

</html>
