<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>رقيم</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f6f2;
      color: #1c1c1c;
      font-family: Tahoma, Arial, sans-serif;
    }

    .page {
      width: min(760px, 92%);
      margin: 0 auto;
      padding: 35px 0 80px;
    }

    .back {
      display: inline-block;
      margin-bottom: 45px;
      color: #666;
      text-decoration: none;
      font-size: 15px;
    }

    article {
      background: #fff;
      border: 1px solid #e5e2da;
      border-radius: 16px;
      padding: 35px;
    }

    h1 {
      margin: 0 0 15px;
      font-size: clamp(30px, 7vw, 52px);
      line-height: 1.4;
    }

    .author {
      color: #777;
      margin-bottom: 35px;
    }

    .content {
      white-space: pre-wrap;
      font-size: 19px;
      line-height: 2.2;
      word-break: break-word;
    }

    .message {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }

    @media (max-width: 600px) {
      article {
        padding: 24px 20px;
      }

      .content {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <a class="back" href="index.html">← العودة إلى رقيم</a>

    <div id="view">
      <p class="message">جارٍ تحميل النص...</p>
    </div>

  </main>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
      getFirestore,
      doc,
      getDoc
    }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJ01klR3ku0zBWSiwgY8eQECt7kJETboA",
      authDomain: "raqeem-2ab23.firebaseapp.com",
      projectId: "raqeem-2ab23",
      storageBucket: "raqeem-2ab23.firebasestorage.app",
      messagingSenderId: "404345905166",
      appId: "1:404345905166:web:3809b83c0e56c1a6781c5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const view = document.getElementById("view");

    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id");

    function escapeHTML(value = "") {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }

    async function loadPost() {

      if (!postId) {
        view.innerHTML =
          '<p class="message">النص غير موجود.</p>';
        return;
      }

      try {

        const snapshot =
          await getDoc(doc(db, "posts", postId));

        if (!snapshot.exists()) {
          view.innerHTML =
            '<p class="message">النص غير موجود.</p>';
          return;
        }

        const post = snapshot.data();

        document.title =
          `${post.title || "نص"} | رقيم`;

        view.innerHTML = `
          <article>
            <h1>${escapeHTML(post.title)}</h1>

            <div class="author">
              بقلم ${escapeHTML(post.author || "رقيم")}
            </div>

            <div class="content">${escapeHTML(post.content)}</div>
          </article>
        `;

      } catch (error) {

        console.error(error);

        view.innerHTML =
          '<p class="message">تعذر تحميل النص.</p>';

      }

    }

    loadPost();

  </script>

</body>
</html>
