<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>رقيم</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

@font-face {
  font-family: "AmiriLocal";
  src: url("alfont_com_Amiri-Regular.ttf") format("truetype");
  font-display: swap;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f7f7f5;
  color: #1c1c1e;
  font-family: "Noto Sans Arabic", sans-serif;
}

.page {
  width: min(760px, 92%);
  margin: auto;
  padding: 35px 0 100px;
}

.back {
  display: inline-block;
  margin-bottom: 45px;
  color: #8e8e93;
  text-decoration: none;
  font-size: 14px;
}

article {
  background: #fff;
  border-radius: 22px;
  padding: 45px;
  box-shadow: 0 5px 25px rgba(0,0,0,.04);
}

.title {
  margin: 0;
  font-size: 40px;
  font-weight: 700;
  line-height: 1.6;
}

.author {
  margin-top: 14px;
  margin-bottom: 45px;
  color: #6e6e73;
  font-size: 16px;
  font-weight: 600;
}

.content {
  font-family: "AmiriLocal", serif;
  font-size: 32px;
  line-height: 2.35;
  white-space: pre-wrap;
  color: #111;
}

.message {
  text-align: center;
  color: #999;
  padding: 80px 0;
}

.comments {
  margin-top: 35px;
  background: #fff;
  border-radius: 22px;
  padding: 35px;
  box-shadow: 0 5px 25px rgba(0,0,0,.04);
}

.comments-title {
  margin: 0 0 30px;
  font-size: 25px;
}

.comment-form {
  margin-bottom: 40px;
}

.comment-form input,
.comment-form textarea {
  width: 100%;
  border: 1px solid #e5e5e5;
  background: #fafafa;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
  font-family: "Noto Sans Arabic", sans-serif;
  font-size: 15px;
  outline: none;
}

.comment-form textarea {
  min-height: 110px;
  resize: vertical;
}

.comment-form input:focus,
.comment-form textarea:focus {
  border-color: #999;
  background: #fff;
}

.comment-form button {
  border: 0;
  background: #1c1c1e;
  color: #fff;
  border-radius: 13px;
  padding: 13px 25px;
  font-family: "Noto Sans Arabic", sans-serif;
  font-size: 14px;
  cursor: pointer;
}

#commentMessage {
  font-size: 13px;
  color: #777;
  margin-top: 12px;
}

.comment {
  padding: 20px 0;
  border-top: 1px solid #eee;
}

.comment-name {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 7px;
}

.comment-text {
  font-size: 15px;
  line-height: 2;
  white-space: pre-wrap;
  color: #333;
}

.empty-comments {
  color: #999;
  font-size: 14px;
}

@media(max-width:600px) {

  article {
    padding: 30px 22px;
    border-radius: 18px;
  }

  .title {
    font-size: 32px;
  }

  .content {
    font-size: 26px;
    line-height: 2.2;
  }

  .comments {
    padding: 25px 20px;
    border-radius: 18px;
  }

}

</style>

</head>

<body>

<div class="page">

<a class="back" href="index.html">
← العودة إلى رقيم
</a>

<div id="post">

<p class="message">
جارٍ تحميل النص...
</p>

</div>


<section class="comments">

<h2 class="comments-title">
التعليقات
</h2>

<div class="comment-form">

<input
id="commentName"
maxlength="40"
placeholder="اسمك"
>

<textarea
id="commentText"
maxlength="500"
placeholder="اكتب تعليقك..."
></textarea>

<button id="sendComment">
نشر التعليق
</button>

<p id="commentMessage"></p>

</div>


<div id="commentsList">

<p class="empty-comments">
جارٍ تحميل التعليقات...
</p>

</div>

</section>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


const firebaseConfig = {

  apiKey: "AIzaSyCJ01klR3ku0zBWSiwgY8eQECt7kJETboA",

  authDomain: "raqeem-2ab23.firebaseapp.com",

  projectId: "raqeem-2ab23",

  storageBucket: "raqeem-2ab23.firebasestorage.app",

  messagingSenderId: "404345905166",

  appId: "1:404345905166:web:3809b83c0e56c1a6781c5f"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const postBox =
document.getElementById("post");

const commentsList =
document.getElementById("commentsList");

const commentName =
document.getElementById("commentName");

const commentText =
document.getElementById("commentText");

const sendComment =
document.getElementById("sendComment");

const commentMessage =
document.getElementById("commentMessage");


const id =
new URLSearchParams(
window.location.search
).get("id");


function safe(text = "") {

  const div =
  document.createElement("div");

  div.textContent =
  String(text);

  return div.innerHTML;

}


async function loadPost() {

  if (!id) {

    postBox.innerHTML =
    "<p class='message'>النص غير موجود</p>";

    return;

  }


  try {

    const snap =
    await getDoc(
      doc(db, "posts", id)
    );


    if (!snap.exists()) {

      postBox.innerHTML =
      "<p class='message'>النص غير موجود</p>";

      return;

    }


    const data =
    snap.data();


    document.title =
    (data.title || "رقيم") +
    " | رقيم";


    postBox.innerHTML = `

    <article>

      <h1 class="title">
      ${safe(data.title || "بلا عنوان")}
      </h1>

      <div class="author">
      بقلم ${safe(data.author || "رقيم")}
      </div>

      <div class="content">${safe(data.content || "")}</div>

    </article>

    `;

  }

  catch(error) {

    console.error(error);

    postBox.innerHTML =
    "<p class='message'>حدث خطأ أثناء تحميل النص</p>";

  }

}


async function loadComments() {

  if (!id) return;


  try {

    const commentsQuery =
    query(
      collection(db, "comments"),
      where("postId", "==", id)
    );


    const snapshot =
    await getDocs(commentsQuery);


    const comments =
    snapshot.docs.map(item => ({
      id: item.id,
      ...item.data()
    }));


    comments.sort((a, b) => {

      const first =
      a.createdAt?.seconds || 0;

      const second =
      b.createdAt?.seconds || 0;

      return second - first;

    });


    commentsList.innerHTML = "";


    if (comments.length === 0) {

      commentsList.innerHTML = `
      <p class="empty-comments">
      لا توجد تعليقات بعد.
      </p>
      `;

      return;

    }


    comments.forEach(comment => {

      const box =
      document.createElement("div");

      box.className = "comment";


      box.innerHTML = `

      <div class="comment-name">
      ${safe(comment.name || "زائر")}
      </div>

      <div class="comment-text">${safe(comment.text || "")}</div>

      `;


      commentsList.appendChild(box);

    });

  }

  catch(error) {

    console.error(error);

    commentsList.innerHTML = `
    <p class="empty-comments">
    تعذر تحميل التعليقات.
    </p>
    `;

  }

}


sendComment.addEventListener(
"click",
async () => {


  const name =
  commentName.value.trim();

  const text =
  commentText.value.trim();


  if (!name || !text) {

    commentMessage.textContent =
    "اكتب اسمك وتعليقك.";

    return;

  }


  if (name.length > 40 || text.length > 500) {

    commentMessage.textContent =
    "التعليق طويل جداً.";

    return;

  }


  sendComment.disabled = true;

  commentMessage.textContent =
  "جارٍ نشر التعليق...";


  try {

    await addDoc(
      collection(db, "comments"),
      {
        postId: id,
        name: name,
        text: text,
        createdAt: serverTimestamp()
      }
    );


    commentText.value = "";

    commentMessage.textContent =
    "تم نشر تعليقك.";


    await loadComments();

  }

  catch(error) {

    console.error(error);

    commentMessage.textContent =
    "تعذر نشر التعليق.";

  }


  sendComment.disabled = false;

});


loadPost();

loadComments();

</script>

</body>

</html>
