<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>رقيم</title>

<style>

@font-face {
  font-family: "AmiriLocal";
  src: url("alfont_com_Amiri-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f7f7f5;
  color: #1c1c1e;
  font-family: "Noto Sans Arabic", sans-serif;
}

.page {
  width: min(760px, 90%);
  margin: auto;
  padding: 35px 0 100px;
}

.back {
  display: inline-block;
  margin-bottom: 45px;
  color: #8e8e93;
  text-decoration: none;
  font-size: 14px;
}

article {
  background: #fff;
  border-radius: 22px;
  padding: 45px;
  box-shadow: 0 5px 25px rgba(0,0,0,.04);
}

.title {
  margin: 0;
  font-size: 40px;
  font-weight: 700;
  line-height: 1.6;
  letter-spacing: -0.5px;
}

.author {
  margin-top: 14px;
  margin-bottom: 45px;
  color: #6e6e73;
  font-size: 16px;
  font-weight: 600;
}

.content {
  font-family: "AmiriLocal", serif;
  font-size: 32px;
  line-height: 2.35;
  white-space: pre-wrap;
  color: #111;
}

.message {
  text-align: center;
  color: #999;
  padding: 80px 0;
}


/* التعليقات */

.comments {
  margin-top: 35px;
  background: #fff;
  border-radius: 22px;
  padding: 35px;
  box-shadow: 0 5px 25px rgba(0,0,0,.04);
}

.comments-title {
  margin: 0 0 25px;
  font-size: 24px;
  font-weight: 700;
}

#telegramComments {
  min-height: 100px;
}


@media(max-width:600px){

.page {
  width: 92%;
}

article {
  padding: 30px 22px;
  border-radius: 18px;
}

.title {
  font-size: 32px;
}

.author {
  font-size: 15px;
}

.content {
  font-size: 26px;
  line-height: 2.2;
}

.comments {
  padding: 25px 18px;
  border-radius: 18px;
}

.comments-title {
  font-size: 21px;
}

}

</style>

</head>
