<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>رقيم</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>

@font-face {

  font-family: "PoetryFont";

  src: url("Arabic%20Poetry%20Font.otf")
  format("opentype");

  font-weight: normal;

  font-style: normal;

  font-display: swap;

}



*{

 box-sizing:border-box;

}



body{

 margin:0;

 background:#f7f7f5;

 color:#1c1c1e;

 font-family:
 "Noto Sans Arabic",
 sans-serif;

}



.page{

 width:min(760px,90%);

 margin:auto;

 padding:35px 0 100px;

}



.back{

 display:inline-block;

 margin-bottom:50px;

 color:#8e8e93;

 text-decoration:none;

 font-size:14px;

}



article{

 background:#fff;

 border-radius:22px;

 padding:45px;

 box-shadow:
 0 5px 25px rgba(0,0,0,.04);

}



.title{

 margin:0;

 font-size:38px;

 font-weight:500;

 line-height:1.6;

}



.author{

 margin-top:12px;

 margin-bottom:45px;

 color:#8e8e93;

 font-size:14px;

}



.content{


 font-family:"PoetryFont", serif;


 font-size:30px;


 line-height:2.3;


 white-space:pre-wrap;


 color:#111;


}



.message{

 text-align:center;

 color:#999;

 padding:80px 0;

}



@media(max-width:600px){


.page{

 width:92%;

}


article{

 padding:30px 22px;

 border-radius:18px;

}



.title{

 font-size:30px;

}



.content{

 font-size:25px;

 line-height:2.2;

}


}


</style>

</head>


<body>


<div class="page">


<a class="back" href="index.html">
← العودة إلى رقيم
</a>



<div id="post">

<p class="message">
جارٍ تحميل النص...
</p>


</div>



</div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getFirestore,

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey:"AIzaSyCJ01klR3ku0zBWSiwgY8eQECt7kJETboA",

authDomain:"raqeem-2ab23.firebaseapp.com",

projectId:"raqeem-2ab23",

storageBucket:"raqeem-2ab23.firebasestorage.app",

messagingSenderId:"404345905166",

appId:"1:404345905166:web:3809b83c0e56c1a6781c5f"

};



const app=initializeApp(firebaseConfig);


const db=getFirestore(app);



const box=document.getElementById("post");



const id=
new URLSearchParams(location.search).get("id");



function safe(text=""){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

}



async function load(){


if(!id){

box.innerHTML=
"<p class='message'>لا يوجد نص</p>";

return;

}



try{


const snap=
await getDoc(
doc(db,"posts",id)
);



if(!snap.exists()){

box.innerHTML=
"<p class='message'>النص غير موجود</p>";

return;

}



const data=snap.data();



document.title=
data.title+" | رقيم";



box.innerHTML=`

<article>


<h1 class="title">

${safe(data.title || "بلا عنوان")}

</h1>


<div class="author">

بقلم ${safe(data.author || "رقيم")}

</div>


<div class="content">

${safe(data.content || "")}

</div>


</article>

`;



}

catch(e){

console.log(e);

box.innerHTML=
"<p class='message'>حدث خطأ</p>";

}


}



load();


</script>


</body>

</html>
