<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>رقيم</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}

body{

margin:0;

background:#f7f7f5;

color:#1c1c1e;

font-family:"Noto Sans Arabic",sans-serif;

}


.page{

width:min(760px,92%);

margin:auto;

padding:35px 0 100px;

}


.back{

display:inline-block;

margin-bottom:45px;

color:#8e8e93;

text-decoration:none;

font-size:14px;

}



article{

background:#fff;

border-radius:22px;

padding:45px;

box-shadow:
0 5px 25px rgba(0,0,0,.04);

}



.title{

margin:0;

font-size:40px;

font-weight:700;

line-height:1.6;

}



.author{

margin-top:14px;

margin-bottom:45px;

color:#555;

font-size:17px;

font-weight:600;

}



.content{

font-size:32px;

line-height:2.35;

white-space:pre-wrap;

color:#111;

}



.post-actions{

display:flex;

gap:12px;

align-items:center;

margin-top:45px;

padding-top:22px;

border-top:1px solid #eee;

}



.stat-box{

background:#f7f7f5;

border-radius:12px;

padding:10px 15px;

font-size:14px;

color:#666;

}



.like-button{

border:0;

background:#f7f7f5;

border-radius:12px;

padding:10px 18px;

font-size:14px;

cursor:pointer;

}



.like-button.liked{

background:#111;

color:#fff;

}



.comments{

margin-top:35px;

background:#fff;

border-radius:22px;

padding:35px;

box-shadow:
0 5px 25px rgba(0,0,0,.04);

}



.comments-title{

margin:0 0 30px;

font-size:25px;

}



.comment-form textarea{

width:100%;

min-height:120px;

border:1px solid #ddd;

border-radius:14px;

padding:15px;

font-size:15px;

font-family:inherit;

resize:none;

}



.comment-form button{

margin-top:12px;

border:0;

background:#111;

color:#fff;

padding:13px 25px;

border-radius:13px;

cursor:pointer;

}



.comment{

padding:20px 0;

border-top:1px solid #eee;

}



.comment-name{

font-weight:700;

margin-bottom:8px;

}



.comment-text{

line-height:2;

white-space:pre-wrap;

}



.message{

text-align:center;

color:#999;

padding:80px 0;

}

</style>

</head>
<body>


<div class="page">


<a class="back" href="index.html">
← العودة إلى رقيم
</a>



<div id="post">

<p class="message">
جارٍ تحميل النص...
</p>

</div>




<section class="comments">


<h2 class="comments-title">
التعليقات
</h2>



<div class="comment-form">


<textarea
id="commentText"
maxlength="500"
placeholder="اكتب تعليقك..."
></textarea>



<button id="sendComment">
نشر التعليق
</button>



<p id="commentMessage"></p>


</div>




<div id="commentsList">


<p class="message">
جارٍ تحميل التعليقات...
</p>


</div>



</section>


</div>






<script type="module">


import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";



import {

getFirestore,

doc,

getDoc,

collection,

addDoc,

getDocs,

query,

where,

updateDoc,

increment,

setDoc

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



import {

getAuth,

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";





const firebaseConfig={


apiKey:
"AIzaSyCJ01klR3ku0zBWSiwgY8eQECt7kJETboA",


authDomain:
"raqeem-2ab23.firebaseapp.com",


projectId:
"raqeem-2ab23",


storageBucket:
"raqeem-2ab23.firebasestorage.app",


messagingSenderId:
"404345905166",


appId:
"1:404345905166:web:3809b83c0e56c1a6781c5f"


};





const app =
initializeApp(firebaseConfig);



const db =
getFirestore(app);



const auth =
getAuth(app);



let currentUser = null;



onAuthStateChanged(auth,user=>{

currentUser=user;

});





const postBox =
document.getElementById("post");



const commentsList =
document.getElementById("commentsList");



const commentText =
document.getElementById("commentText");



const sendComment =
document.getElementById("sendComment");



const commentMessage =
document.getElementById("commentMessage");





const id =
new URLSearchParams(
window.location.search
).get("id");





const postRef =
doc(db,"posts",id);





function safe(text=""){


const div =
document.createElement("div");


div.textContent=text;


return div.innerHTML;


}
  async function loadPost(){


try{


const snap =
await getDoc(postRef);



if(!snap.exists()){


postBox.innerHTML =

`
<p class="message">
النص غير موجود
</p>
`;

return;

}



const data =
snap.data();



document.title =
(data.title || "رقيم") + " | رقيم";



postBox.innerHTML =

`

<article>


<h1 class="title">
${safe(data.title || "بلا عنوان")}
</h1>



<div class="author">
بقلم ${safe(data.author || "رقيم")}
</div>



<div class="content">
${safe(data.content || "")}
</div>




<div class="post-actions">


<div class="stat-box">

المشاهدات:
${data.views || 0}

</div>



<button
id="likeButton"
class="like-button"
>

❤️ إعجاب

<span id="likesCount">

${data.likes || 0}

</span>

</button>


</div>



</article>

`;



document
.getElementById("likeButton")
.onclick = likePost;



}



catch(error){

console.log(error);


postBox.innerHTML =

`
<p class="message">
حدث خطأ في تحميل النص
</p>
`;

}


}








async function likePost(){


if(!currentUser){


alert("سجل الدخول بحساب Google أولاً");


return;

}



const likeId =
id + "_" + currentUser.uid;



const likeRef =
doc(db,"likes",likeId);



try{


const likeSnap =
await getDoc(likeRef);



if(likeSnap.exists()){

return;

}




await setDoc(

likeRef,

{

postId:id,

uid:currentUser.uid

}

);




await updateDoc(

postRef,

{

likes:increment(1)

}

);



const count =
document.getElementById("likesCount");



count.textContent =
Number(count.textContent)+1;



document
.getElementById("likeButton")
.classList.add("liked");



}


catch(error){

console.log(error);

}


}
  async function loadComments(){


try{


const q =
query(

collection(db,"comments"),

where("postId","==",id)

);



const snapshot =
await getDocs(q);



commentsList.innerHTML = "";



if(snapshot.empty){


commentsList.innerHTML =

`
<p class="message">
لا توجد تعليقات بعد.
</p>
`;

return;


}




snapshot.forEach(item=>{


const comment =
item.data();



const div =
document.createElement("div");



div.className =
"comment";



div.innerHTML =

`

<div class="comment-name">

مستخدم رقيم

</div>


<div class="comment-text">

${safe(comment.text || "")}

</div>

`;



commentsList.appendChild(div);



});


}

catch(error){

console.log(error);


commentsList.innerHTML =

`
<p class="message">
تعذر تحميل التعليقات
</p>
`;

}


}








sendComment.onclick = async()=>{


if(!currentUser){


commentMessage.textContent =
"سجل الدخول بحساب Google أولاً";


return;

}



const text =
commentText.value.trim();



if(!text){


commentMessage.textContent =
"اكتب تعليقك";


return;


}




try{


await addDoc(

collection(db,"comments"),

{

postId:id,

uid:currentUser.uid,

text:text

}

);



commentText.value = "";



commentMessage.textContent =
"تم نشر التعليق";



await loadComments();



}

catch(error){


console.log(error);


commentMessage.textContent =
"حدث خطأ أثناء النشر";


}


};







loadPost();

loadComments();



</script>


</body>

</html>
