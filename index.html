<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="description"
    content="رقيم، مساحة للنصوص الشعرية الفصيحة والشعبية"
  >

  <title>رقيم</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"

  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">

    <div class="header-inner">

      <a href="index.html" class="logo">
        رقيم
      </a>

      <nav class="nav">
        <a href="#texts">النصوص</a>
        <a href="#about">من نحن</a>
        <a href="#contact">تواصل معنا</a>
      </nav>

    </div>

  </header>


  <main>

    <section class="hero">

      <h1>رقيم</h1>

      <p>
        مساحة هادئة للكلمة والشعر
      </p>

    </section>


    <section class="texts" id="texts">

      <div class="section-head">

        <h2>النصوص</h2>

        <div class="filters">

          <button
            class="filter active"
            data-type="all"
          >
            الكل
          </button>

          <button
            class="filter"
            data-type="fusha"
          >
            فصيح
          </button>

          <button
            class="filter"
            data-type="shaabi"
          >
            شعبي
          </button>

        </div>

      </div>


      <div id="poemGrid" class="poem-grid">

        <p class="loading">
          جارٍ تحميل النصوص...
        </p>

      </div>

    </section>


    <section class="simple-section" id="about">

      <h2>من نحن</h2>

      <p>
        رقيم مساحة أدبية تهتم بالنصوص الشعرية
        الفصيحة والشعبية، وتمنح الكلمة مكانًا
        بسيطًا وهادئًا للقراءة.
      </p>

    </section>


    <section class="simple-section" id="contact">

      <h2>تواصل معنا</h2>

      <p>
        للتواصل والمقترحات والمشاركة الأدبية.
      </p>

      <a
        class="contact-link"
        href="mailto:fdm42143@gmail.com"
      >
        البريد الإلكتروني
      </a>

    </section>

  </main>


  <footer class="footer">

    <p>
      رقيم © 2026
    </p>

  </footer>


  <script src="script.js"></script>

</body>

</html>
