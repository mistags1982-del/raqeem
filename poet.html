<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>الشاعر - رقيم</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#f7f7f5;
color:#1c1c1e;
font-family:"Noto Sans Arabic",sans-serif;
}

.container{
width:min(800px,92%);
margin:40px auto;
}

.card{
background:white;
border:1px solid #eee;
border-radius:20px;
padding:25px;
margin-bottom:20px;
}

h1{
text-align:center;
font-size:38px;
margin:0;
}

.bio{
line-height:2;
color:#555;
margin-top:20px;
text-align:center;
}

.poem{
border-top:1px solid #eee;
padding:20px 0;
}

.poem h2{
margin:0 0 10px;
}

.meta{
color:#777;
font-size:14px;
}

.content{
white-space:pre-line;
line-height:2.3;
margin-top:20px;
}

.message{
text-align:center;
color:#999;
padding:40px;
}

</style>

</head>


<body>


<div class="container">


<div class="card">

<h1 id="poetName">
الشاعر
</h1>


<p id="poetBio" class="bio">

</p>

</div>




<div class="card">


<h2>
قصائد الشاعر
</h2>


<div id="poems">

<p class="message">
جاري التحميل...
</p>

</div>


</div>


</div>




<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";



import {

getFirestore,
doc,
getDoc,
collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";




const firebaseConfig = {

apiKey:"AIzaSyCJ01klR3ku0zBWSiwgY8eQECt7kJETboA",

authDomain:"raqeem-2ab23.firebaseapp.com",

projectId:"raqeem-2ab23",

storageBucket:"raqeem-2ab23.firebasestorage.app",

messagingSenderId:"404345905166",

appId:"1:404345905166:web:3809b83c0e56c1a6781c5f"

};



const app =
initializeApp(firebaseConfig);


const db =
getFirestore(app);




const poetId =
new URLSearchParams(location.search).get("id");



const poetName =
document.getElementById("poetName");


const poetBio =
document.getElementById("poetBio");


const poems =
document.getElementById("poems");





async function loadPoet(){


if(!poetId){

poetName.textContent =
"لا يوجد شاعر";

return;

}



try{


const snap =
await getDoc(
doc(db,"poets",poetId)
);



if(!snap.exists()){


poetName.textContent =
"الشاعر غير موجود";


return;

}



const data =
snap.data();



poetName.textContent =
data.name || "شاعر";


poetBio.textContent =
data.bio || "";



}

catch(error){

console.error(error);

}


}







async function loadPoems(){


if(!poetId){

return;

}



try{


const q =
query(

collection(db,"posts"),

where(
"poetId",
"==",
poetId
)

);



const snap =
await getDocs(q);



poems.innerHTML="";



if(snap.empty){


poems.innerHTML =
`

<p class="message">
لا توجد قصائد لهذا الشاعر
</p>

`;

return;

}





snap.forEach(item=>{


const p =
item.data();



poems.innerHTML += `


<div class="poem">


<h2>
${p.title || "بلا عنوان"}
</h2>


<div class="meta">

${p.type==="fusha" ? "فصيح" : "شعبي"}

</div>



<div class="content">

${p.content || ""}

</div>


</div>


`;



});



}

catch(error){


console.error(error);


poems.innerHTML =
`

<p class="message">
حدث خطأ في تحميل القصائد
</p>

`;

}


}




loadPoet();

loadPoems();



</script>


</body>

</html>
