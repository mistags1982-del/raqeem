<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>رُقيم</title><link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><style>.poem-page{max-width:760px;padding:70px 0 100px}.back{font-size:10px;color:#805c35}.poem-page h1{font:700 clamp(48px,8vw,75px) 'Amiri';margin:30px 0 5px}.poem-cat{font-size:10px;color:#805c35}.poem-image{width:100%;max-height:520px;object-fit:cover;margin:35px 0}.poem-text{font:25px/2.25 'Amiri';margin-top:45px}</style></head><body><header><div class="wrap nav"><a class="logo" href="index.html">رُقيم</a></div></header><main class="wrap poem-page"><a class="back" href="index.html">← العودة إلى رُقيم</a><article id="poem"></article></main><script src="poems.js"></script><script>const id=Number(new URLSearchParams(location.search).get('id')||0),p=poems[id];document.title=p.title+' | رُقيم';document.getElementById('poem').innerHTML=`<h1>${p.title}</h1><div class="poem-cat">${p.category}</div>${p.image?`<img class="poem-image" src="${p.image}" alt="${p.title}">`:''}<div class="poem-text">${p.content}</div>`;</script></body></html>
